[buildPlans.Tempestypes]
family = "Tempestypes"
spacing = "fontconfig-mono"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.Tempestypes.variants.design]
two = "straight-neck-serifless"
three = "flat-top-serifless"
four = "closed-serifless"
five = "upright-flat-hook-serifless"
six = "open-contour"
eight = "crossing"
nine = "open-contour"
zero = "oval-dotted"
capital-b = "more-asymmetric-serifless"
capital-j = "descending-flat-hook-serifed"
capital-m = "flat-bottom-serifless"
capital-q = "closed-swash"
capital-u = "toothed-serifless"
capital-w = "straight-flat-top-serifless"
a = "single-storey-serifless"
f = "flat-hook-extended-crossbar-at-x-height"
g = "single-storey-serifless"
i = "hooky"
l = "serifed"
r = "compact-serifless"
t = "bent-hook-short-neck2"
w = "straight-flat-top-serifless"
y = "cursive-serifless"
cyrl-a = "double-storey-hook-inward-serifed-serifed"
tittle = "square"
diacritic-dot = "square"
punctuation-dot = "square"
braille-dot = "square"
ellipsis-density = "dense"
asterisk = "hex-low"
paren = "large-contour"
brace = "curly"
guillemet = "curly"
number-sign = "upright-tall"
ampersand = "lower-open"
at = "compact"
percent = "rings-continuous-slash"
question = "corner"
pilcrow = "curved"
decorative-angle-brackets = "tall"
lig-ltgteq = "slanted"
lig-neq = "slightly-slanted"
lig-equal-chain = "without-notch"
lig-hyphen-chain = "without-notch"
lig-plus-chain = "without-notch"
lig-single-arrow-bar = "without-notch"

  [buildPlans.Tempestypes.ligations]
  inherits = "dlig"

[buildPlans.Tempestypes.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Tempestypes.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.Tempestypes.weights.Light]
shape = 300
menu = 300
css = 300

[buildPlans.Tempestypes.widths.Normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.Tempestypes.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"
